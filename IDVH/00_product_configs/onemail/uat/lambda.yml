# Tier base: Lambda standard per uat.
standard:
  runtime: nodejs24.x
  handler: index.handler
  architectures: ["x86_64"]
  memory_size: 512
  timeout: 30
  publish: true
  ignore_source_code_hash: true
  cloudwatch_logs_retention_in_days: 30

# Tier alternativo: Lambda standard per uat.
standard_external_code_bucket:
  runtime: nodejs24.x
  handler: index.handler
  architectures: ["x86_64"]
  memory_size: 512
  timeout: 30
  publish: true
  ignore_source_code_hash: true
  cloudwatch_logs_retention_in_days: 30
