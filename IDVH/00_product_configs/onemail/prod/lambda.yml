# Tier base: Lambda standard per prod.
standard:
  runtime: nodejs24.x
  handler: dist/app.handler
  architectures: ["x86_64"]
  memory_size: 1024
  timeout: 60
  publish: true
  ignore_source_code_hash: true
  cloudwatch_logs_retention_in_days: 90

# Tier alternativo: Lambda standard per prod.
standard_external_code_bucket:
  runtime: nodejs24.x
  handler: dist/app.handler
  architectures: ["x86_64"]
  memory_size: 1024
  timeout: 60
  publish: true
  ignore_source_code_hash: true
  cloudwatch_logs_retention_in_days: 90
